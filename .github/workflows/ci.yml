name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  golang-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/golang
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: api/golang/go.sum
      - run: go mod download
      - run: go build -v ./...
      - run: go test -v ./...

  nodejs-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/nodejs
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/nodejs/package-lock.json
      - run: npm ci
      - name: Check syntax
        run: node --check index.js
